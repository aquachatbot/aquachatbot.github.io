  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ─────────────────────────────────────────────────────────────
    //  🔧 REPLACE with your Firebase project config
    // ─────────────────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyAw6d2-p3OpjLSJ0oLppkKqUNrQ3C_Yf9Q",
      authDomain: "aquachatbot-b7168.firebaseapp.com",
      projectId: "aquachatbot-b7168",
      storageBucket: "aquachatbot-b7168.firebasestorage.app",
      messagingSenderId: "556947541441",
      appId: "1:556947541441:web:1b3abb80f67217e14cb340",
      measurementId: "G-83NQJ47H62"
    };
    // ─────────────────────────────────────────────────────────────

    let db = null;
    const SESSION_ID = "session_" + Date.now();

    try {
      const app = initializeApp(firebaseConfig);
      db = getFirestore(app);
      console.log("✅ Firebase connected");
      window._firebaseReady = true;
      window._saveMessage = async (role, content) => {
        try {
          await addDoc(collection(db, "chat_sessions", SESSION_ID, "messages"), {
            role, content, timestamp: serverTimestamp()
          });
        } catch (e) { console.warn("Firebase save failed:", e.message); }
      };
      window._loadHistory = async () => {
        try {
          const q = query(
            collection(db, "chat_sessions", SESSION_ID, "messages"),
            orderBy("timestamp", "asc")
          );
          const snap = await getDocs(q);
          return snap.docs.map(d => ({ role: d.data().role, content: d.data().content }));
        } catch (e) { return []; }
      };
    } catch (e) {
      console.warn("Firebase not configured — running without persistence.");
      window._firebaseReady = false;
      window._saveMessage = async () => { };
      window._loadHistory = async () => [];
    }
  </script>

  <style>
    :root {
      --navy: #0a1628;
      --deep: #0d2240;
      --mid: #0e3a5c;
      --teal: #0b7fa8;
      --cyan: #00c2e0;
      --aqua: #4de8ff;
      --foam: #c8f7ff;
      --white: #f0faff;
      --glass: rgba(11, 127, 168, 0.15);
      --border: rgba(77, 232, 255, 0.2);
      --shadow: 0 8px 32px rgba(0, 194, 224, 0.12);
      --font-hd: 'Rajdhani', sans-serif;
      --font-bd: 'DM Sans', sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--navy);
      font-family: var(--font-bd);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ─── animated water background ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 80%, rgba(11, 127, 168, 0.25) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 20%, rgba(0, 194, 224, 0.18) 0%, transparent 55%),
        radial-gradient(ellipse 100% 80% at 50% 110%, rgba(13, 58, 92, 0.9) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    /* floating bubbles */
    .bubble {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(77, 232, 255, 0.4), rgba(0, 194, 224, 0.08));
      border: 1px solid rgba(77, 232, 255, 0.15);
      animation: rise linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes rise {
      0% {
        transform: translateY(110vh) scale(1);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 0.6;
      }

      100% {
        transform: translateY(-10vh) scale(1.1);
        opacity: 0;
      }
    }

    /* ─── layout ─── */
    .app {
      position: relative;
      z-index: 1;
      width: min(760px, 100vw);
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
    }

    /* ─── header ─── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 20px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 20px;
      backdrop-filter: blur(16px);
      flex-shrink: 0;
    }

    .mascot-wrap {
      position: relative;
      width: 56px;
      height: 56px;
      flex-shrink: 0;
    }

    .mascot-svg {
      width: 56px;
      height: 56px;
      filter: drop-shadow(0 0 10px rgba(77, 232, 255, 0.6));
      animation: bob 3s ease-in-out infinite;
    }

    @keyframes bob {

      0%,
      100% {
        transform: translateY(0) rotate(-2deg);
      }

      50% {
        transform: translateY(-5px) rotate(2deg);
      }
    }

    .status-dot {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 12px;
      height: 12px;
      background: #00e676;
      border-radius: 50%;
      border: 2px solid var(--navy);
      animation: pulse-dot 2s ease infinite;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.5);
      }

      50% {
        box-shadow: 0 0 0 5px rgba(0, 230, 118, 0);
      }
    }

    .header-text {
      flex: 1;
    }

    .header-text h1 {
      font-family: var(--font-hd);
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--aqua);
      line-height: 1;
    }

    .header-text p {
      font-size: 0.72rem;
      color: rgba(200, 247, 255, 0.6);
      margin-top: 3px;
      letter-spacing: 0.5px;
      text-transform: uppercase;

    .header-badge {

      border: 1px solid rgba(0, 194, 224, 0.3);
      color: var(--cyan);
      font-family: var(--font-hd);
      font-size: 0.7rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* ─── chat window ─── */
    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scrollbar-width: thin;
      scrollbar-color: var(--teal) transparent;
    }

    .chat-window::-webkit-scrollbar {
      width: 4px;
    }

    .chat-window::-webkit-scrollbar-thumb {
      background: var(--teal);
      border-radius: 4px;
    }

    /* ─── messages ─── */
    .msg {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      animation: fadeUp 0.3s ease both;
      max-width: 88%;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;

    .msg.bot {

    .msg-avatar {

      font-size: 0.88rem;
      line-height: 1.55;

      align-items: center;
      gap: 4px;
      padding: 12px 16px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 18px;
      border-bottom-left-radius: 4px;

    .typing-indicator span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--cyan);
      animation: blink 1.2s ease infinite;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-indicator span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes blink {

      0%,
      80%,

        opacity: 0.3;
        transform: scale(0.85);
      }

      40% {
        opacity: 1;
        transform: scale(1.15);
      }

    /* ─── quick chips ─── */
    .chips {

      flex-wrap: wrap;
      gap: 6px;
      padding: 0 4px;
      flex-shrink: 0;

    .chip {

      border: 1px solid rgba(0, 194, 224, 0.3);

      transition: all .2s;
      font-family: var(--font-hd);

    .chip:hover {

      align-items: center;
      gap: 10px;

      border: 1px solid var(--border);

      background: none;
      border: none;
      outline: none;

      font-family: var(--font-bd);

      line-height: 1.4;

      align-items: center;

      background: linear-gradient(135deg, var(--cyan), var(--teal));

      box-shadow: 0 4px 12px rgba(0, 194, 224, 0.35);

    .msg-bubble a {
      color: var(--cyan);

    .msg-bubble ul,
    .msg-bubble ol {
      padding-left: 18px;
      margin: 6px 0;
    }

    .msg-bubble li {
      margin: 2px 0;
    }
  </style>
</head>

    // ─── Render helpers ───────────────────────────────────────────
    function renderMarkdown(text) {
      return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/`(.*?)`/g, '<code style="background:rgba(0,194,224,0.15);padding:1px 5px;border-radius:4px;font-size:0.82em">$1</code>')
        .replace(/^### (.+)$/gm, '<strong style="color:var(--aqua);font-size:0.95em">$1</strong>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>\n?)+/g, s => `<ul>${s}</ul>`)
        .replace(/\n{2,}/g, '</p><p>')
        .replace(/\n/g, '<br>')
        .replace(/^(.+)$/, '<p>$1</p>');
    }

    function appendMsg(role, text, animate = true) {
      const win = document.getElementById('chatWindow');
      const wrap = document.createElement('div');
      wrap.className = `msg ${role}`;
      if (!animate) wrap.style.animation = 'none';

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.innerHTML = role === 'user'
        ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v2h20v-2c0-3.3-6.7-5-10-5z"/></svg>'
        : '<svg width="14" height="14" viewBox="0 0 100 120" fill="#003d5c"><path d="M50 8C50 8 18 50 18 72A32 32 0 0082 72C82 50 50 8 50 8Z" fill="#00c2e0"/></svg>';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.innerHTML = renderMarkdown(text);

      wrap.appendChild(avatar);
      wrap.appendChild(bubble);
      win.appendChild(wrap);
      win.scrollTop = win.scrollHeight;
      return wrap;
    }

    function showTyping() {
      const win = document.getElementById('chatWindow');
      const wrap = document.createElement('div');
      wrap.className = 'msg bot';
      wrap.id = 'typingMsg';
      wrap.innerHTML = `
    <div class="msg-avatar">
      <svg width="14" height="14" viewBox="0 0 100 120"><path d="M50 8C50 8 18 50 18 72A32 32 0 0082 72C82 50 50 8 50 8Z" fill="#00c2e0"/></svg>
    </div>
    <div class="typing-indicator"><span></span><span></span><span></span></div>`;
      win.appendChild(wrap);
      win.scrollTop = win.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typingMsg');
      if (el) el.remove();
    }

    // ─── Firebase status ──────────────────────────────────────────
    setTimeout(() => {
      const el = document.getElementById('fbStatus');
      if (window._firebaseReady) {
        el.className = 'fb-status on';
        el.textContent = '⬤ Firebase connected — chat history is saved';
      } else {
        el.className = 'fb-status off';
        el.textContent = '⬤ Firebase not configured — running in-memory only';
      }
    }, 1200);

    // ─── Send message ─────────────────────────────────────────────
    // ─── Send message ─────────────────────────────────────────────
    async function sendMessage(text) {
      const input = document.getElementById('userInput');
      const btn = document.getElementById('sendBtn');
      const userText = (text || input.value).trim();
      if (!userText) return;

      input.value = '';
      input.style.height = '24px';
      btn.disabled = true;

      // 1. Add user message to UI and history
      appendMsg('user', userText);
      history.push({ role: 'user', content: userText });
      await window._saveMessage('user', userText);

      showTyping();

      try {
        // 🛑 REPLACE WITH YOUR ACTUAL GEMINI API KEY 🛑
        const GEMINI_API_KEY = "AIzaSyCJi6HyuMiPHslt6W_EF_XnclKtjWPDTiA";
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;

        // 2. Format the history array specifically for Gemini's API format
        const geminiHistory = history.map(msg => ({
          role: msg.role === 'assistant' ? 'model' : 'user',
          parts: [{ text: msg.content }]
        }));

        // 3. Construct the Gemini payload
        const payload = {
          systemInstruction: {
            parts: [{ text: SYSTEM_PROMPT }]
          },
          contents: geminiHistory,
          generationConfig: {
            maxOutputTokens: 1000,
            temperature: 0.7,
          }
        };

        // 4. Fetch from Google Gemini API
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();

        // 5. Extract the response text
        const reply = data.candidates?.?.content?.parts?.?.text || "I'm having a little splash of trouble — please try again!";

        removeTyping();
        appendMsg('bot', reply);
        history.push({ role: 'assistant', content: reply });
        await window._saveMessage('assistant', reply);

      } catch (err) {
        removeTyping();
        appendMsg('bot', "⚠️ Connection issue. Please check your network and try again.\n\nYou can also reach us directly at **800-940-5008** or **solutions@aqua-aerobic.com**.");
        console.error("Chat Error:", err);
      }

      btn.disabled = false;
      input.focus();
    }

    function sendChip(el) {
      sendMessage(el.textContent);
    }

    // ─── Input auto-resize + Enter to send ───────────────────────
    const ta = document.getElementById('userInput');
    ta.addEventListener('input', () => {
      ta.style.height = '24px';
      ta.style.height = Math.min(ta.scrollHeight, 90) + 'px';
    });
    ta.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    // ─── Welcome message ──────────────────────────────────────────
    window.addEventListener('load', () => {

        appendMsg('bot',

          "Since 1969 we've been protecting the world's water with advanced aeration, filtration, biological processes, PFAS solutions, and more — serving municipalities and industries across the globe from our home in **Loves Park, IL**.\n\n" +
          "Ask me anything! Or tap a quick topic below. 💧"
        );
      }, 400);
    });
  </script>
